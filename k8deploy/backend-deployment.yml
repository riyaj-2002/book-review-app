apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 17082002/book-review-app:backend
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DB_HOST
          value: mysql
        - name: DB_NAME
          value: book_review_db
        - name: DB_USER
          value: pravin
        - name: DB_PASS
          value: Demo12@Test23
        - name: DB_DIALECT
          value: mysql
        - name: JWT_SECRET
          value: mysecretkey
        - name: ALLOWED_ORIGINS
          value: http://localhost:3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP

